name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint (includes architecture enforcement)
        run: deno lint

      - name: Type check
        run: deno check main.ts

      - name: Format check
        run: deno task fmt:check
